[target.xtensa-esp32-espidf]
linker = "ldproxy"
runner = "espflash flash --monitor"

[unstable]
build-std = ["std", "panic_abort"]

[alias]
check-esp = "check --target xtensa-esp32-espidf"
clippy-esp = "clippy --target xtensa-esp32-espidf -- -D warnings"
test-host = "test --lib"
build-esp = "build --target xtensa-esp32-espidf"

[net]
git-fetch-with-cli = true

[build]
rustflags = [
    # NOTE: -W flags removed — they leak into dependency crates.
    # Use #![warn(..)] in src/lib.rs instead for crate-local linting.
    # Linker wrap: intercept esp_panic_handler to dump diagnostics
    "-C", "link-arg=-Wl,--wrap=esp_panic_handler",
]

[env]
MCU = "esp32"
ESP_IDF_VERSION = "v6.0.1"
IDF_PATH = "/home/vlabe/.espressif/v6.0.1/esp-idf"
LIBCLANG_PATH = "/home/vlabe/.rustup/toolchains/esp/xtensa-esp32-elf-clang/esp-20.1.1_20250829/esp-clang/lib"
