lessons:
  - id: LL-018
    date: 2026-07-04
    crash_signature: "assert failed: ble_hs_init ble_hs.c:975 (rc == 0) — NimBLE host init C assert uncaught by Rust — largest=23KB, threshold was 20KB"
    category: heap_exhaustion
    trigger_patterns:
      - "ble_hs_init"
      - "assert failed.*ble_hs"
      - "BLEDevice::init.*crash"
      - "BLE init skipped.*heap too fragmented"
    lesson: >
      The NimBLE heap pre-check threshold (20KB) was too low. After HTTP init
      the largest contiguous block was 23KB — barely above the threshold.
      BLE init was attempted, but NimBLE's internal `ble_hs_init()` assert
      fired (C-level assert), killing the entire ESP32 process before Rust
      error handling could catch it. The C assert is uncatchable from Rust.

      The fix: raise the heap pre-check threshold to 30KB. This is conservative
      enough to prevent BLE init from being attempted when insufficient memory
      exists, while still allowing BLE when DRAM is healthy (>30KB largest).

      Key insight: The check MUST be conservative. A "barely enough" heap
      check (20KB vs 23KB, 15% margin) is worse than no check at all —
      it creates a false sense of safety and leads to a process-killing
      C assert. Minimum 30% margin recommended for NimBLE host init.

      The debug broadcast was also running every tick (~10ms) instead of
      every ~300ms (should_broadcast rate). This bloated the main loop from
      ~5ms to ~31ms, delaying DNS polling and WebSocket delivery. Moving it
      inside should_broadcast() restored main loop performance.
    diagnostic: >
      1. Check for "assert failed: ble_hs_init" in crash log.
      2. Check heap at http_started phase: if largest < 30KB, BLE will crash.
      3. Check ble.rs threshold: must be >= 30_000.
      4. If BLE is consistently skipped, verify largest >= 30KB after HTTP.
    fix: >
      Raise BLE heap pre-check threshold from 20KB to 30KB in ble.rs:
        if largest < 30_000 { skip BLE init }
      Also move debug broadcast inside should_broadcast() in main.rs
      to keep main loop under 10ms per tick.
    refs:
      - src/infrastructure/network/ble.rs (heap pre-check threshold)
      - src/main.rs (debug broadcast placement)
      - docs/plans/pending/26_07_01_ble_issues.md
      - docs/lessons_learned.yaml (LL-007, LL-015)

  - id: LL-017
    date: 2026-07-04
    crash_signature: "Captive portal silent failure — phone connects to AP but no portal pop-up — HTTP probes time out"
    category: dma_heap_fragmentation
    trigger_patterns:
      - "Captive portal silent failure"
      - "connectivity check failed"
      - "no internet"
      - free=19KB largest=12KB http_started
    lesson: >
      The captive portal code (DNS responder + 5 HTTP 302 redirects) was
      CORRECTLY implemented. The portal did not appear because the system
      had insufficient DRAM (largest=12KB after HTTP init) to allocate
      lwIP TCP buffers for incoming client HTTP probes.

      When a client connects to the AP:
        1. DNS resolves captive.apple.com / connectivitycheck.gstatic.com
           to 192.168.4.1 — works (UDP, lightweight)
        2. Client sends HTTP GET to the probed URL
        3. lwIP fails to allocate contiguous TCP buffer (~4-6KB per socket)
           — largest block is only 12KB and HTTP server reserves sockets
        4. HTTP probe times out → OS sees "network error", not HTTP 302
        5. No captive portal pop-up

      The fix was three-pronged:
        (a) DRAM pressure relief: LOG_BUFFER_SIZE 100→20 (~27KB),
            max_open_sockets 5→4 (~4KB), BLE MAX_CCCD=4 (~256B).
            Total: ~31KB freed.
        (b) Reduced main loop latency: moved debug broadcast into
            should_broadcast() — loop dropped from ~31ms to ~5ms,
            improving DNS response time.
        (c) BLE heap threshold raised to 30KB (prevents C assert crash
            when BLE init is attempted with insufficient memory).

      After these changes: largest after HTTP init = 23KB (was 12KB,
      with LOG_BUFFER_SIZE saving being the dominant factor).

      Key insight: A DRAM-constrained system can have ALL the right code
      and still fail. Always verify that enough contiguous DRAM exists
      for lwIP TCP buffers before concluding the HTTP/captive portal
      code is wrong.
    diagnostic: >
      1. Connect phone to AP — if captive portal does NOT appear but
         manual http://192.168.4.1 works, suspect DRAM.
      2. Check boot log for [HEAP] http_started: largest < 20KB.
      3. lwIP needs ~4-6KB contiguous per TCP connection; with
         max_open_sockets=5, reserve ~20-30KB just for sockets.
      4. If largest after HTTP init < 20KB, captive portal will fail
         silently — fix DRAM, not code.
    fix: >
      Free DRAM until largest block after HTTP init >= 20KB:
      - LOG_BUFFER_SIZE: 100→20 (~27KB)
      - max_open_sockets: 5→4 (~4KB)
      - CONFIG_BT_NIMBLE_MAX_CCCD=4 (~256B)
      - Move debug broadcast inside should_broadcast() to reduce
        main loop latency and improve DNS polling rate.
    refs:
      - src/domain/memory.rs (LOG_BUFFER_SIZE)
      - src/infrastructure/network/http_server.rs (max_open_sockets)
      - src/main.rs (broadcast placement)
      - sdkconfig.defaults (NimBLE buffers)
      - docs/lessons_learned.yaml (LL-015, LL-016)

  - id: LL-016
    date: 2026-07-04
    crash_signature: "No crash — proactive DRAM margin improvement — CONFIG_ESP_WIFI_DYNAMIC_RX/TX_BUFFER_NUM 8→4"
    category: dma_heap_fragmentation
    trigger_patterns:
      - "Init dynamic rx buffer num: \\d+"
      - "Init dynamic tx buffer num: \\d+"
      - "heap free.*largest.*after 10s"
    lesson: >
      Reducing CONFIG_ESP_WIFI_DYNAMIC_RX_BUFFER_NUM and
      CONFIG_ESP_WIFI_DYNAMIC_TX_BUFFER_NUM from 8 to 4 each saves
      ~12.8KB of DRAM (2 × 4 × 1600 bytes). The change is safe for
      a laboratory instrument that only sends small status payloads
      and sensor readings over WiFi — no throughput degradation
      observed.

      After applying this change the build compiles with 0 errors,
      0 warnings. The firmware boots and passes a 30-second smoke
      test with no Guru Meditation, WDT, or panics. The WiFi init
      log confirms the new buffer counts:

        I (1679) wifi:Init dynamic tx buffer num: 4
        I (1699) wifi:Init dynamic rx buffer num: 4

      This is one of several "low-hanging fruit" DRAM optimizations
      identified by the RAM audit (see LL-015 for the full cascade).
      Combined with LOG_BUFFER_SIZE reduction (100→20, ~27KB),
      MAX_CCCD=4 + MSYS1=8 (~3.5KB), max_open_sockets 5→3 (~5KB),
      and other tweaks, the total recoverable DRAM is ~39KB, which
      would bring the system from 3KB free to ~42KB free with a
      largest block of ~30-40KB.
    diagnostic: >
      Verify by checking the boot log for "Init dynamic rx buffer
      num" and "Init dynamic tx buffer num". Also verify that
      heap free/largest after 10s runtime has increased by at least
      10KB compared to the 8→8 baseline (LL-015 trajectory).
    fix: >
      Set in sdkconfig.defaults:
        CONFIG_ESP_WIFI_DYNAMIC_RX_BUFFER_NUM=4
        CONFIG_ESP_WIFI_DYNAMIC_TX_BUFFER_NUM=4
      Then run `idf.py reconfigure` and rebuild.
    refs:
      - sdkconfig.defaults
      - docs/lessons_learned.yaml (LL-015, heap trajectory)
      - src/main.rs (main loop heap logging)

  - id: LL-015
    date: 2026-07-04
    crash_signature: "heap free=3K largest=3K after ~10s steady-state — no crash but everything degrades — OOM on any alloc >3KB"
    category: dma_heap_fragmentation
    trigger_patterns:
      - "free=3K.*largest=3K"
      - "Heap: free=\\d+K, largest=\\d+K, DMA_largest=\\d+K"
      - "Failed to create task"
      - "UART reader thread disconnected"
      - "ESP_ERR_HTTPD_TASK"
    lesson: >
      After full init sequence (WiFi→HTTP→BLE→motor/temp/uart threads) and
      ~10 seconds of runtime, the heap collapses to 3KB free / 3KB largest
      contiguous block. This is not a leak but cumulative internal
      fragmentation: each init phase allocates and frees buffers, leaving
      the TLSF allocator with many small holes.

      Measured heap trajectory during a single boot:
        Boot:          159K free, 108K largest
        Pre-WiFi:      136K free, 108K largest
        Post-WiFi:      69K free,  60K largest  (WiFi driver allocs)
        Post-HTTP:      50K free,  42K largest  (HTTP server task + handlers)
        Post-BLE:       30K free,  20K largest  (NimBLE HCI + GATT + advertising)
        Motor spawn:    25K free,  15K largest  (16KB stack alloc fragments)
        Temp spawn:     22K free,  12K largest
        UART spawn:     18K free,  10K largest
        10s runtime:     3K free,   3K largest  (WebSocket broadcasts + logging)

      Every prior fix in this session (LL-010 through LL-014) fixed a symptom
      but exposed the next symptom further down the heap cascade. The system
      has no DRAM margin — any alloc > 3KB will OOM.

      The feasibility study §7 was correct: "no margin — 0 to 5 KB free".
      Phase 0 measurements (§11) were misleading because they tested only
      WiFi + BLE init without HTTP server, worker threads, or runtime load.

    diagnostic: >
      1. Log heap_caps_get_free_size(MALLOC_CAP_DEFAULT) and
         heap_caps_get_largest_free_block(MALLOC_CAP_DEFAULT) after every
         init phase and every 10s in steady-state.
      2. If largest < 10KB after all inits, the system will OOM on any
         non-trivial operation.
      3. If largest drops continuously during steady-state (not just during
         init), there is a runtime allocation pattern that fragments the heap.
      4. Check broadcast_websocket_event() — each call may alloc+free
         heapless::String which, despite "heapless" name, may trigger
         internal reallocation on the C side.
      5. Check log::info! in the main loop — format_args! allocates
         temporaries on the stack (not heap) but also triggers C-side
         printf buffer management.
    fix: >
      The only reliable fix on ESP32-WROOM-32 (no PSRAM) is one of:
      A) Hardware: upgrade to ESP32-WROVER-B (8MB PSRAM, pin-compatible,
         +$1.50-2.00). PSRAM makes all DRAM constraints disappear.
      B) Reduce feature set: strip BLE or HTTP server to free ~50-70KB.
         Product impact: loss of BLE connectivity or WebUI.
      C) Aggressive DRAM budget: reduce NimBLE buffers (ACL=12, MSYS=12,
         CCCD=4), reduce HTTP handler count, remove WebSocket static file
         handlers, reduce log buffer, use opt-level=s. Saves ~15-20KB
         but still leaves zero margin.
      Option A is the only permanent fix. Options B/C are temporary patches.
    refs:
      - docs/plans/completed/26_06_27_rust_esp_idf_v6_feasibility_study.md (§7, §11)
      - sdkconfig.defaults (all CONFIG_* buffer sizes)
      - src/infrastructure/network/http_server.rs (broadcast_websocket_event)
      - src/main.rs (init order, thread spawns)

  - id: LL-014
    date: 2026-07-04
    crash_signature: "UART reader thread panic on std::io::stdin().read() — first call panics — stdout (println!) works fine"
    category: api_misuse
    trigger_patterns:
      - "std::io::stdin\\(\\)\\.read"
      - "UART reader thread disconnected"
      - "stdin.*panic"
      - "uart_driver_install.*not called"
      - "uart_vfs_dev_use_driver"
    lesson: >
      ESP-IDF's boot console only sets up polled-mode output via direct UART
      register writes (printf/println! works). It does NOT install the UART
      driver required for interrupt-driven blocking input. When
      std::io::stdin().read() (which goes through libc read(0) → ESP-IDF VFS)
      is called, the VFS layer has no driver backing fd 0, causing a panic.

      The three-step fix:
        1. uart_vfs_dev_register() — register UART VFS device (idempotent)
        2. uart_driver_install(UART_NUM_0, rx_buf, 0, queue_size, NULL, 0)
           — install UART driver with RX buffer
        3. uart_vfs_dev_use_driver(UART_NUM_0) — switch VFS to driver mode

      This init was planned as a feature (uart0_driver_init) in esp-idf-sys's
      start.rs but was never completed — the code remains commented out.
    diagnostic: >
      1. Check if stdout (println!) works but stdin (read) panics —
         this confirms the UART driver is not installed for VFS reads.
      2. Check esp-idf-sys/src/start.rs for the commented-out init_uart0()
         function — this is the canonical fix.
      3. Verify that uart_vfs_dev_register(), uart_driver_install(), and
         uart_vfs_dev_use_driver() are available in the generated bindings.
      4. Rule out stack overflow (LL-010/LL-001) by checking watermark first;
         if watermark > 2048 with 8KB stack, it's not overflow.
    fix: >
      Add uart_init_stdin() in esp_safe.rs that calls the three FFI functions
      above. Call it once from main() before spawning any thread that reads
      from stdin. See docs/crash_reports/2026-07-04_uart_stdin_panic.md for the complete
      implementation.
    refs:
      - src/esp_safe.rs (uart_init_stdin)
      - src/main.rs (call site before UART thread)
      - docs/crash_reports/2026-07-04_uart_stdin_panic.md
      - ~/.cargo/git/checkouts/esp-idf-sys-*/src/start.rs (commented-out init code)

  - id: LL-013
    date: 2026-07-04
    crash_signature: "pthread: Failed to create task! ×3 — UART reader thread disconnected flooding — post-BLE heap free=11KB largest=9KB — motor/temp/uart threads never spawned"
    category: dma_heap_fragmentation
    trigger_patterns:
      - "Failed to create task"
      - "UART reader thread disconnected"
      - "pthread: Failed to create task"
      - "PTHREAD_TASK_STACK_SIZE_DEFAULT"
    lesson: >
      BLE NimBLE init consumes ~30KB of DRAM via MALLOC_CAP_INTERNAL for the
      host controller interface, GATT database, and advertising buffers. After
      WiFi (69→50KB) and HTTP (50→30KB), BLE consumes the remaining contiguous
      INTERNAL memory, leaving only 11KB free / 9KB largest block.

      When subsequent threads (motor 16KB, temp 16KB, uart 8KB) are spawned via
      std::thread, the FreeRTOS pthread layer calls xTaskCreate() which needs
      MALLOC_CAP_INTERNAL stack memory. With only 9KB largest contiguous block,
      even the 8KB uart thread fails. The `pthread: Failed to create task!` log
      confirms xTaskCreate returned pdFAIL.

      The consequence is not a crash but a silent degradation: motor never homes,
      temperature never reads, UART stdin reader never starts (producing endless
      "UART reader thread disconnected" warnings).

      This is a DRAM budget problem: WiFi + HTTP + BLE consume ~148KB of the
      ~196KB usable DRAM, leaving only ~48KB for all other threads. With motor
      (16K) + temp (16K) + uart (8K) = 40KB total stack requirement, there is
      physically enough memory but it is fragmented into pieces < 9KB.

    diagnostic: >
      1. Check post-BLE heap: free < 15KB or largest < 10KB → threads will fail.
      2. Look for "pthread: Failed to create task!" in the log — this confirms
         xTaskCreate failure from DRAM exhaustion.
      3. Count the thread spawns that fail: each failure is one uncreatable thread.
      4. Check if the failing threads are spawned AFTER BLE init in the boot
         sequence — if yes, either move them BEFORE BLE or reduce BLE footprint.
      5. Run `idf.py menuconfig` → Component config → Bluetooth → NimBLE Options
         and check: CONFIG_BT_NIMBLE_ACL_BUF_COUNT, CONFIG_BT_NIMBLE_HCI_EVT_BUF_SIZE,
         CONFIG_BT_NIMBLE_MSYS1_BLOCK_COUNT.
    fix: >
      Option A (preferred): Reorder boot sequence so that motor/temp/uart threads
      are spawned BEFORE BLE init (while heap has 50KB+ largest block). BLE init
      becomes the last step after all worker threads are running.

      Option B: Reduce NimBLE DRAM footprint in sdkconfig.defaults:
        CONFIG_BT_NIMBLE_ACL_BUF_COUNT=12 (was 24, saves ~2KB)
        CONFIG_BT_NIMBLE_HCI_EVT_BUF_SIZE=70 (was 256, saves ~1KB)
        CONFIG_BT_NIMBLE_MSYS1_BLOCK_COUNT=12 (was 24, saves ~3KB)
        CONFIG_BT_NIMBLE_MAX_CCCD=4 (was 8, saves ~1KB)

      Option C: Reduce thread stack sizes (risky — see GR-6 budget table):
        motor: 16K → 12K (risks stack overflow on complex homing profiles)
        temp: 16K → 8K (risks stack overflow on DS18B20 bitbang)
        uart: 8K → keep (already at minimum per LL-010)

      Option A is preferred because it doesn't reduce safety margins.
    refs:
      - sdkconfig.defaults (NimBLE buffer configs)
      - src/main.rs (thread spawn order)
      - src/config.rs (thread stack sizes)
      - AGENTS.md §3 (DRAM init order triangle GR-3)
      - AGENTS.md §4 (thread model & stack budget GR-6)
      - docs/crash_reports/2026-07-04_http_dropped_motor_oom.md
    fix_applied: 2026-07-04

  - id: LL-012
    date: 2026-07-04
    crash_signature: "memory allocation of 40000 bytes failed — compute_ramp — motor_task homing — free=30KB largest=20KB"
    category: heap_exhaustion
    trigger_patterns:
      - "memory allocation of \\d+ bytes failed"
      - "compute_ramp"
      - "with_capacity.*total_steps"
      - "HOMING_MAX_STEPS"
    lesson: >
      compute_ramp() allocates Vec<u32> with capacity = total_steps. With
      HOMING_MAX_STEPS=10000 this is 40KB; with full-volume motion (62,922
      steps via volume_to_steps) this would be ~250KB. These allocations
      happen in the motor thread AFTER BLE init has consumed ~30KB heap,
      leaving only 20KB largest contiguous block.

      Use RampIter (a lazy iterator) instead of compute_ramp wherever
      possible. RampIter produces identical per-step intervals but computes
      them on-the-fly with zero heap allocation. The only memory needed is
      a small chunk buffer (RMT_CHUNK_MAX × 2 symbols × 8 bytes = ~2KB)
      inside move_steps_intervals().

      The same pattern applies to move_steps() (the StepperMotor trait
      impl) which previously allocated Vec for every motion command. Both
      homing and regular motion commands now use RampIter directly.
    diagnostic: >
      1. If crash shows "memory allocation of NNNNN bytes failed" with
         compute_ramp in the backtrace, the fix is to use RampIter instead.
      2. Check heap at crash time: free < NNNNN or largest < NNNNN.
      3. Check if BLE init (30KB) has already consumed memory before
         the motor task runs.
    fix: >
      Replace compute_ramp + Vec allocation with RampIter:
        // BEFORE: let intervals = compute_ramp(steps, &cfg);
        //         stepper.move_steps_intervals(ctx, &intervals)?;
        // AFTER:  stepper.move_steps_intervals(ctx, RampIter::new(steps, &cfg))?;
      move_steps_intervals() accepts impl IntoIterator<Item = u32> so
      RampIter can be passed directly.
    refs:
      - src/stepper/ramp.rs (RampIter struct)
      - src/infrastructure/drivers/stepper.rs (move_steps_intervals)
      - src/motor_task.rs (homing call site)
      - docs/crash_reports/2026-07-04_http_dropped_motor_oom.md

  - id: LL-011
    date: 2026-07-04
    crash_signature: "Unregistered Httpd server handler for URI ... Httpd server stopped — immediate after startup"
    category: api_misuse
    trigger_patterns:
      - "Unregistered Httpd server handler"
      - "Httpd server stopped"
      - "G_HTTP_SERVER_ALIVE.*false"
      - "http_ok.*false"
    lesson: >
      When HttpServer::new() is called with `match Ok(_)`, the underscore
      pattern discards the created HttpServer immediately. When the match
      arm ends, the HttpServer goes out of scope and its Drop impl calls
      httpd_stop() via EspHttpServer::drop(). This unregisters all
      handlers and stops the server before BLE init even starts.

      The fix is to bind the HttpServer to a variable (e.g. `let _http_server`
      for explicit lifetime management) so it lives for the duration of the
      enclosing scope (net_owner thread loop).

      Any RAII guard that wraps an ESP-IDF resource that starts a task or
      allocates a service MUST be stored by name, not matched as `_` or
      `Ok(_)`. The `_` pattern is a sign that the caller didn't think about
      the object's lifetime — it should be linted.
    diagnostic: >
      1. Check for "Unregistered Httpd server handler" logs immediately
         after "HTTP: server started" — this indicates the server was
         created and immediately destroyed.
      2. Find the HttpServer::new() call site and check if the return
         value is bound to `_` or stored in a `bool` without keeping
         the server.
      3. If `G_HTTP_SERVER_ALIVE` is set to true then immediately false,
         the HttpServer Drop cleared it.
    fix: >
      Store the HttpServer:
        let _http_server = match HttpServer::new(wifi_mgr) {
            Ok(server) => Some(server),
            Err(e) => { log::error!(...); None }
        };
      The `_http_server` naming convention signals intentional discard
      (it's not used after creation but its Drop is important).
    refs:
      - src/main.rs (net_owner thread, ~line 243)
      - src/infrastructure/network/http_server.rs (HttpServer::new, Drop)
      - docs/crash_reports/2026-07-04_http_dropped_motor_oom.md

  - id: LL-010
    date: 2026-07-04
    crash_signature: "IllegalInstruction + stack overflow in task pthread — uart watermark=540 — UART_THREAD_STACK=4096 — preceded by wifi:malloc buffer fail"
    category: stack_overflow
    trigger_patterns:
      - "stack overflow in task pthread"
      - "uart watermark=540"
      - "UART_THREAD_STACK"
      - "Thread 3 'uart' low stack"
    lesson: >
      Rust std::thread tasks using `std::io::stdin().read()` need MORE than
      4 KB stack. The FFI call chain (Rust std → libc → ESP-IDF VFS → UART
      driver → FreeRTOS xQueueReceive) consumes 3+ KB of stack. With
      CONFIG_PTHREAD_TASK_STACK_SIZE_DEFAULT=8192, the std::thread default is
      8 KB — any explicit stack_size below 8 KB for threads doing FFI I/O
      will overflow.

      The diagnostic routine `check_watermark()` triggers `log::warn!()` when
      the watermark drops below 1024 bytes. The `log::warn!()` call itself
      consumes ~300-400 bytes of stack for format_args! temporaries and FFI
      calls (mutex_lock/unlock, esp_timer_get_time). This means the diagnostic
      code can push an already-critical thread over the edge — the warning
      becomes the final straw.

      ALL threads showing watermark=0 in the crash dump does NOT mean all
      threads overflowed. The emergency_dump() renders `u16::MAX` (never
      checked) as 0. Only the thread that was registered AND checked before
      the crash has a meaningful watermark.

    diagnostic: >
      1. Check which thread has a non-zero watermark — that's the only thread
         whose stack was checked before the crash.
      2. Check `src/config.rs` for the thread's stack size — anything below
         8192 for threads doing FFI calls is suspicious.
      3. Verify the `UART_THREAD_STACK` (and any other small-stack thread)
         against the AGENTS.md GR-6 budget table.
      4. If `check_watermark` fires a warning on a critically low stack, the
         `log::warn!()` call itself may push the stack over — reduce log
         verbosity or increase the stack.
    fix: >
      Set UART_THREAD_STACK to at least 8192 (matching the
      CONFIG_PTHREAD_TASK_STACK_SIZE_DEFAULT). For threads doing blocking
      FFI I/O, 16384 is safer. Review ALL thread stack sizes against the
      GR-6 budget table in AGENTS.md.
    refs:
      - src/config.rs
      - docs/crash_reports/2026-07-04_uart_stack_overflow.md


  - id: LL-001
    date: 2026-07-02
    crash_signature: "PC=0x40359c07 A2=0xFFFFFFFC EXCVADDR=0x0"
    category: stack_overflow
    trigger_patterns:
      - "A2:\\s*0x[fF]{8}"            # A2: 0xFFFFFFFF (really 0xFFFFFFFC)
      - "A2=0xFFFFFFFC"               # also matches = format
      - "EXCVADDR.*0x00000000"        # NULL pointer
      - "tlsf_check"                  # allocator crash
      - "heap_caps_.*free"            # heap allocator
    lesson: >
      On ESP32 with ESP-IDF v6, boot-time heap corruption crashes
      (A2=0xFFFFFFFC, TLSF free-list corrupted) are usually caused by
      main task stack overflow, not by actual heap corruption. Stack
      overflow writes into adjacent TLSF metadata, producing misleading
      heap allocator crash signatures. ALWAYS check
      uxTaskGetStackHighWaterMark(NULL) FIRST before analyzing heap,
      ELF sections, or pthread_mutex_t.
    diagnostic: S1_stack_watermark
    fix: CONFIG_ESP_MAIN_TASK_STACK_SIZE=32768 (or larger)
    refs:
      - docs/plans/completed/26_07_02_phase5_postmortem.md
      - docs/protocols/stack_overflow.md

  - id: LL-002
    date: 2026-07-02
    crash_signature: "RMT encoder panic: Unknown rmt_encode_state_t value: 3"
    category: api_misuse
    trigger_patterns:
      - "Unknown rmt_encode_state_t"
    lesson: >
      RMT encoder panic in esp-idf-hal v0.46 (commit 24e99b86).
      rmt_encode_state_t is a BITMASK type (values: RESET=0, COMPLETE=1,
      MEM_FULL=2, WITH_EOF=4) where multiple flags can be set at once.
      The esp-idf-hal From<rmt_encode_state_t> implementation uses exact
      match on individual values instead of bitwise tests, so combined
      states like COMPLETE | MEM_FULL (value 3) fall through to panic.
      Value 3 is NOT RMT_ENCODING_WITH_EOF (which is 4). The cfg guard
      #[cfg(esp_idf_version_at_least_5_5_0)] works correctly — it handles
      value 4; the issue is that value 3 is a different combined state.
      This is triggered when the RMT signal size exactly fills one memory
      block (~1024 symbols), causing the driver to return both COMPLETE
      and MEM_FULL simultaneously.
    diagnostic: none (known dependency bug in esp-idf-hal upstream code)
    fix: >
      Patch esp-idf-hal's From<rmt_encode_state_t> to use bitwise AND
      instead of exact match, or update esp-idf-hal to a newer revision
      that fixes this. APPLIED 2026-07-02: bitwise patch confirmed working
      in git checkout at
      ~/.cargo/git/checkouts/esp-idf-hal-*/24e99b8/src/rmt/encoder.rs.
    refs:
      - docs/crash_reports/2026-07-02_rmt_encode_state_panic.md

  - id: LL-003
    date: 2026-07-03
    crash_signature: "thread 'net_owner' panicked at 'WifiManager::new(): WifiConnectionFailed' — preceded by wifi:malloc buffer fail, NvsOpenFailed"
    category: dma_heap_fragmentation
    trigger_patterns:
      - "NVS open failed: NvsOpenFailed"
      - "wifi:malloc buffer fail"
      - "Expected to init (10|4) rx buffer, actual is"
      - "WifiManager::new\\(\\): WifiConnectionFailed"
    lesson: >
      The root cause is persistent DMA heap fragmentation on ESP32.
      After Motor(16K)+Temp(16K)+UART(4K) stack allocations (36K total),
      the largest free MALLOC_CAP_DMA block is ~5K, regardless of free
      SRAM (137K).

      ESP32's DRAM is a single physical region used BOTH for thread stacks
      (MALLOC_CAP_8BIT) and WiFi DMA buffers (MALLOC_CAP_DMA). Even though
      these are different capability flags, they allocate from the same
      physical memory pool. Each thread stack allocation fragments this
      pool, and the TLSF allocator cannot coalesce sufficiently for
      contiguous DMA allocations of 6.4K+.

      EspDefaultNvsPartition::take() is NOT consumed by EspWifi::new() —
      EspWifi::new() only reads nvs.is_some() to set the nvs_enable
      boolean flag. The nvs_enable flag controls whether the closed-source
      WiFi libpp.a reads PHY calibration data from NVS via its own
      nvs_open("phy") call. This does NOT affect DMA buffer allocation size.

      The "NVS open failed: NvsOpenFailed" warning is a red herring —
      it comes from WifiManager::load_credentials_from_nvs() which calls
      NvsManager::open("wifi") via raw FFI nvs_open(). This is completely
      independent of the Rust EspDefaultNvsPartition. The warning means
      NVS partition hasn't been written yet (empty on first boot), which
      is normal.
    diagnostic: >
      1. Measure heap_caps_get_largest_free_block(MALLOC_CAP_DMA) at boot
         — this is the critical metric, not total free heap.
      2. After Motor(16K)+Temp(16K)+UART(4K) stacks: largest DMA ~5K.
      3. CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM must be set to match the
         available contiguous DMA block (3 max = 4.8K).
      4. CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM=3 is the stable maximum on
         this hardware with current stack sizes.
    fix: >
      Set CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM=3. This gives 3×1600=4.8K
      contiguous DMA which fits in the available heap after 36K of thread
      stacks. Also clone EspSystemEventLoop before passing to
      WifiManager::new() to keep lwIP alive if WiFi init fails.
    refs:
      - docs/plans/pending/26_06_30_phase4_network_report.md
    fix_applied: 2026-07-03

  - id: LL-005
    date: 2026-07-03
    crash_signature: "LoadProhibited, EXCVADDR=0x00000000 — uart stack overflow in sleep()"
    category: instrumentation_gap
    trigger_patterns:
      - "LoadProhibited"
      - "StoreProhibited"
      - "Guru Meditation"
      - "execvaddr:\\s*0x0+"
    lesson: >
      Rust std::panic::set_hook() does NOT fire for hardware exceptions
      (LoadProhibited, StoreProhibited). These go through ESP-IDF's C
      esp_panic_handler() directly. The diag black box and stack watermarks
      are never dumped for hardware crashes. Fix: override esp_panic_handler
      via linker wrapping (-Wl,--wrap=esp_panic_handler) — this is the
      common entry point for ALL ESP-IDF panic events (both Rust panics
      and hardware exceptions).
    diagnostic: >
      Confirm by checking that the "!!! PANIC" header is absent from the
      crash log. If a crash produces Guru Meditation output without the
      diag panic hook header, the hook was bypassed.
    fix: >
      Add __wrap_esp_panic_handler in esp_safe.rs that dumps black box and
      stack watermarks before calling the real handler. Requires linker
      flags and matching panic_info_t / XtExcFrame Rust structs.
    refs:
      - docs/plans/pending/26_07_03_crash_diag_system.md

  - id: LL-004
    date: 2026-07-03
    crash_signature: "assert failed: tcpip_send_msg_wait_sem /IDF/components/lwip/lwip/src/api/tcpip.c:454 (Invalid mbox) — preceded by 'System event loop dropped'"
    category: sysloop_lifecycle
    trigger_patterns:
      - "System event loop dropped"
      - "tcpip_send_msg_wait_sem"
      - "Invalid mbox"
    lesson: >
      When EspWifi::new() fails (e.g. from DMA malloc buffer fail), the
      EspSystemEventLoop parameter is consumed by value and dropped on
      the error return path. The EspSystemEventLoop destructor stops the
      lwIP tcpip thread (via internal FreeRTOS queue deletion). Any
      subsequent lwIP operation — HTTP server bind, BLE GATT init,
      UdpSocket::bind for DNS — crashes with:
        assert failed: tcpip_send_msg_wait_sem ... (Invalid mbox)

      This is an architectural invariant: EspSystemEventLoop must outlive
      ALL lwIP consumers. Since it's consumed by value in
      WifiManager::new(), the caller MUST clone it FIRST and keep the
      clone alive in the same scope.
    diagnostic: >
      Look for "System event loop dropped" in the boot log. If present,
      all subsequent lwIP operations will fail with Invalid mbox assert.
      The assert is a secondary symptom — the primary cause is the
      dropped event loop.
    fix: >
      Clone EspSystemEventLoop before passing to WifiManager::new() and
      keep the clone alive for the entire owner thread scope:
        let _sysloop_keepalive = sys_loop.clone();
        let wifi_mgr = WifiManager::new(modem, sys_loop, ...);
        // _sysloop_keepalive lives here → lwIP stays alive
        // even if WifiManager::new() returns Err
      NOTE: This fix is NECESSARY but NOT SUFFICIENT (see LL-006).
      It only prevents killing an existing TCP/IP thread; it does NOT
      create one if esp_netif_init() was never called.
    refs:
      - docs/plans/pending/26_06_30_phase4_network_report.md
      - docs/crash_reports/2026-07-04_boot_invalid_mbox.md
    note: >
      The LL-004 fix prevents the 'System event loop dropped' sub-case but
      does NOT address the case where esp_netif_init() was never called.
      For the complete fix, see LL-006 (call esp_netif_init() unconditionally
      at boot before any network operations).

  - id: LL-006
    date: 2026-07-04
    crash_signature: "assert failed: tcpip_send_msg_wait_sem /IDF/components/lwip/lwip/src/api/tcpip.c:454 (Invalid mbox) — NO 'System event loop dropped' message — preceded by WiFi init failure (create wifi task: failed to create task)"
    category: init_order_error
    trigger_patterns:
      - "Invalid mbox"
      - "tcpip_send_msg_wait_sem"
      - "create wifi task: failed to create task"
      - "assert failed: tcpip_send_msg_wait_sem"
    lesson: >
      esp_netif_init() (which creates the lwIP TCP/IP thread and its mbox)
      is ONLY called inside EspWifi::wrap() → EspNetif::new() →
      initialize_netif_stack(). When EspWifi::new() fails (e.g. from DRAM
      exhaustion in esp_wifi_init), the wrap() is never reached, so the
      TCP/IP thread is never created.

      The LL-004 _sysloop_keepalive clone prevents killing an existing
      TCP/IP thread (by keeping the event loop alive). But if the TCP/IP
      thread was NEVER created (because EspWifi::wrap() never ran), the
      clone is pointless — the mbox is still uninitialized.

      The crash signature is identical to LL-004 (assert: Invalid mbox)
      but WITHOUT the 'System event loop dropped' message, and WITH a
      preceding 'wifi:create wifi task: failed to create task' (0x3001)
      indicating EspWifi::new() failed before creating netifs.
    diagnostic: >
      1. Check for ABSENCE of 'System event loop dropped' log message.
      2. Check for 'wifi:create wifi task: failed to create task' (0x3001).
      3. Verify that esp_netif_init() was called before WifiManager::new().
         If the only call site is inside EspWifi::wrap(), and wrap() was
         skipped, then esp_netif_init() was never called.
      4. Heap trajectory: Pre-WiFi ~136K → Post-WiFi failure ~18K (largest 6K).
    fix: >
      Call esp_netif_init() UNCONDITIONALLY at boot, after
      EspSystemEventLoop::take() and before WifiManager::new(). Add a safe
      wrapper in esp_safe.rs:
        pub fn netif_init() {
            // SAFETY: esp_netif_init() is idempotent.
            unsafe { esp_idf_sys::esp_netif_init(); }
        }
      esp_netif_init() is internally idempotent (guarded by a static flag),
      so calling it before WifiManager::new() has no effect if WiFi init
      succeeds, and ensures the lwIP thread exists if WiFi init fails.
    refs:
      - docs/crash_reports/2026-07-04_boot_invalid_mbox.md

  - id: LL-007
    date: 2026-07-04
    crash_signature: "PC=0x402cf9d7 EXCVADDR=0x00000000 A2=0x00000000 — npl_freertos_eventq_get(NULL) called from blecent_host_task"
    category: ignored_return_value
    trigger_patterns:
      - "hci inits failed"
      - "nimble host init failed"
      - "BLE Host Task Started"
      - "pc=0x402cf9d7"
      - "npl_freertos_eventq_get"
    lesson: >
      The esp32-nimble crate's BLEDevice::init() ignores the return value of
      nimble_port_init(). When this function fails (e.g. from DRAM exhaustion
      causing esp_nimble_hci_init() to fail), the BLE host FreeRTOS task is
      still spawned via nimble_port_freertos_init(). The task immediately
      crashes with a NULL dereference because the default event queue
      (g_eventq_dflt) was never initialized (ble_npl_eventq_init() happens
      after the early return in esp_nimble_init()).
    diagnostic: >
      1. Look for "BLE_INIT: hci inits failed" followed by
         "BLE_INIT: nimble host init failed" in the boot log.
      2. Confirm crash backtrace includes npl_freertos_eventq_get called
         from blecent_host_task at ble_device.rs:365.
      3. Crash immediately follows "BLE Host Task Started" log line.
      4. Check heap trajectory: largest contiguous block < 12K before BLE init.
      5. The calling thread (net_owner) is stuck spinning forever in
         BLEDevice::init() waiting for SYNCED flag that will never be set.
    fix: >
      1. PATCH esp32-nimble: return early from BLEDevice::init() if
         nimble_port_init() returns error — do NOT spawn the host task.
      2. Add heap pre-condition check (largest >= 20K) before calling
         ble_mgr.init() in the project main.rs.
      3. Reduce WiFi dynamic buffer counts
         (CONFIG_ESP_WIFI_DYNAMIC_RX_BUFFER_NUM=16,
         CONFIG_ESP_WIFI_DYNAMIC_TX_BUFFER_NUM=16) to minimize
         DRAM fragmentation.
    refs:
      - docs/crash_reports/2026-07-04_ble_host_task_null_deref.md

  - id: LL-008
    date: 2026-07-04
    crash_signature: "IllegalInstruction + stack overflow in task pthread — net_owner watermark=0 — preceded by wifi:malloc buffer fail"
    category: stack_overflow
    trigger_patterns:
      - "stack overflow in task pthread"
      - "net_owner watermark=0"
      - "IllegalInstruction.*pthread"
      - "A stack overflow in task pthread has been detected"
    lesson: >
      Error paths consume MORE stack than happy paths. Adding FFI retry loops
      (wifi_deinit_retry), log::error! with format_args! (5+ temporaries), and
      nested FFI calls to a thread's error branch pushes the 32 KB net_owner
      stack over budget. The happy path leaves ~20 KB watermark, but the error
      path exhausts the entire stack.

      When adding error recovery code to a thread with a budgeted stack:
      - Measure BOTH happy and error path watermarks (not just happy path)
      - format! / log::error! with many {} placeholders allocates temporaries
        on the stack (each temporary ~32-64 bytes, 5+ = 160-320+ bytes)
      - FFI calls (esp_wifi_deinit, esp_rom_delay_us) consume additional
        C-side stack (~1-2 KB each)
      - Retry loops multiply per-iteration stack usage by iteration count
      - Prefer heapless::String + write! over format! in constrained contexts

      The total stack budget for the error path must include ALL nested calls
      in the match arm, not just the happy-path frame.
    diagnostic: >
      1. Check if crash is preceded by an error log in the net_owner thread.
      2. Check net_owner stack watermark — if 0, stack overflow confirmed.
      3. Compare happy path watermark (measured before crash) vs error path
         (often 0 because crash happens before measurement).
      4. Look for wifi_deinit_retry, log::error! with many params, or other
         stack-heavy code in the error branch.
      5. Use uxTaskGetStackHighWaterMark() inside the error branch itself.
    fix: >
      Remove or reduce stack-heavy code from error paths in budgeted threads:
      - Move retry loops to a separate thread or reduce retry count
      - Split long log messages into multiple shorter ones
      - Move complex error recovery to a dedicated worker thread with its own
        stack, not the primary net_owner thread
      - Increase thread stack if budget allows (NET_OWNER_STACK: 32K → 48K)
    refs:
      - docs/crash_reports/2026-07-04_phase6_postmortem.md

  - id: LL-009
    date: 2026-07-04
    crash_signature: "wifi:malloc buffer fail — Expected to init (3|8) rx buffer, actual is 0 — preceded by free=108K largest=108K"
    category: dma_heap_fragmentation
    trigger_patterns:
      - "wifi:malloc buffer fail"
      - "Expected to init.*rx buffer, actual is 0"
      - "ESP_ERR_HTTPD_TASK"
      - "error code 45064"
    lesson: >
      Reducing WiFi dynamic buffer counts (32→16→8) does NOT fix WiFi init
      failure when the static RX buffer allocation itself fails. The static
      RX buffers use CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM=3 (minimum viable)
      and require MALLOC_CAP_INTERNAL contiguous memory. After thread stack
      allocations (Motor 16K + Temp 16K + UART 4K + net_owner 32K = 68K),
      the available MALLOC_CAP_INTERNAL contiguous block is insufficient for
      the WiFi driver's internal allocation pattern.

      The heap_caps_get_largest_free_block(MALLOC_CAP_DEFAULT) reports 108K
      but this includes MALLOC_CAP_8BIT memory that is NOT usable for WiFi's
      MALLOC_CAP_INTERNAL allocations. The two pools overlap in physical DRAM
      but have different alignment/capability requirements that TLSF cannot
      satisfy simultaneously after fragmentation.

      The ESP-IDF v6.0.1 WiFi init sequence:
      1. Allocate WiFi driver task stack (3.5 KB, MALLOC_CAP_INTERNAL)
      2. Allocate static RX buffers (3×1600 = 4.8K, MALLOC_CAP_INTERNAL)
      3. Allocate dynamic buffer pools (8×1600 each ×4 = 51.2K, MALLOC_CAP_INTERNAL)
      4. Register Rx callbacks

      Step 1 or 2 fails → deinit also fails (0x3001) → memory leaked → HTTP
      cannot allocate 12K for server task → BLE cannot allocate 20K for HCI.

      The CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM=3 is ALREADY the minimum.
      Further reduction is not possible without patching ESP-IDF source.
    diagnostic: >
      1. Check heap_caps_get_largest_free_block(MALLOC_CAP_INTERNAL) before
         WiFi init — this is the critical metric, NOT MALLOC_CAP_DEFAULT.
      2. Check CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM — if already 3, the
         issue is not buffer count but MALLOC_CAP_INTERNAL fragmentation.
      3. After WiFi failure, check if ESP_ERR_NO_MEM (0x3001) on deinit
         confirms the memory leak.
      4. If pre-WiFi largest INTERNAL block < 12K+overhead, WiFi will fail.
    fix: >
      Proper fix requires one of:
      a) Allocate thread stacks from MALLOC_CAP_INTERNAL-excluded memory
         (needs esp-idf-hal patch)
      b) Move WiFi init to a dedicated memory partition (ESP32 memory
         layout change)
      c) Allocate stacks via a custom allocator that doesn't fragment
         INTERNAL memory
      d) Upgrade to ESP-IDF v6.1+ which may have fixed the WiFi driver
         allocation sequence
      e) Accept AP-only mode (no STA) — current fallback works
    refs:
      - docs/crash_reports/2026-07-04_phase6_postmortem.md
