lessons:
  - id: LL-001
    date: 2026-07-02
    crash_signature: "PC=0x40359c07 A2=0xFFFFFFFC EXCVADDR=0x0"
    category: stack_overflow
    trigger_patterns:
      - "A2:\\s*0x[fF]{8}"            # A2: 0xFFFFFFFF (really 0xFFFFFFFC)
      - "A2=0xFFFFFFFC"               # also matches = format
      - "EXCVADDR.*0x00000000"        # NULL pointer
      - "tlsf_check"                  # allocator crash
      - "heap_caps_.*free"            # heap allocator
    lesson: >
      On ESP32 with ESP-IDF v6, boot-time heap corruption crashes
      (A2=0xFFFFFFFC, TLSF free-list corrupted) are usually caused by
      main task stack overflow, not by actual heap corruption. Stack
      overflow writes into adjacent TLSF metadata, producing misleading
      heap allocator crash signatures. ALWAYS check
      uxTaskGetStackHighWaterMark(NULL) FIRST before analyzing heap,
      ELF sections, or pthread_mutex_t.
    diagnostic: S1_stack_watermark
    fix: CONFIG_ESP_MAIN_TASK_STACK_SIZE=32768 (or larger)
    refs:
      - docs/plans/completed/26_07_02_phase5_postmortem.md
      - docs/protocols/stack_overflow.md

  - id: LL-002
    date: 2026-07-02
    crash_signature: "RMT encoder panic: Unknown rmt_encode_state_t value: 3"
    category: api_misuse
    trigger_patterns:
      - "Unknown rmt_encode_state_t"
    lesson: >
      RMT encoder panic in esp-idf-hal v0.46 (commit 24e99b86).
      rmt_encode_state_t is a BITMASK type (values: RESET=0, COMPLETE=1,
      MEM_FULL=2, WITH_EOF=4) where multiple flags can be set at once.
      The esp-idf-hal From<rmt_encode_state_t> implementation uses exact
      match on individual values instead of bitwise tests, so combined
      states like COMPLETE | MEM_FULL (value 3) fall through to panic.
      Value 3 is NOT RMT_ENCODING_WITH_EOF (which is 4). The cfg guard
      #[cfg(esp_idf_version_at_least_5_5_0)] works correctly — it handles
      value 4; the issue is that value 3 is a different combined state.
      This is triggered when the RMT signal size exactly fills one memory
      block (~1024 symbols), causing the driver to return both COMPLETE
      and MEM_FULL simultaneously.
    diagnostic: none (known dependency bug in esp-idf-hal upstream code)
    fix: >
      Patch esp-idf-hal's From<rmt_encode_state_t> to use bitwise AND
      instead of exact match, or update esp-idf-hal to a newer revision
      that fixes this. APPLIED 2026-07-02: bitwise patch confirmed working
      in git checkout at
      ~/.cargo/git/checkouts/esp-idf-hal-*/24e99b8/src/rmt/encoder.rs.
    refs:
      - docs/crash_reports/rmt_encode_state_panic.md

  - id: LL-003
    date: 2026-07-03
    crash_signature: "thread 'net_owner' panicked at 'WifiManager::new(): WifiConnectionFailed' — preceded by wifi:malloc buffer fail, NvsOpenFailed"
    category: dma_heap_fragmentation
    trigger_patterns:
      - "NVS open failed: NvsOpenFailed"
      - "wifi:malloc buffer fail"
      - "Expected to init (10|4) rx buffer, actual is"
      - "WifiManager::new\\(\\): WifiConnectionFailed"
    lesson: >
      The root cause is persistent DMA heap fragmentation on ESP32.
      After Motor(16K)+Temp(16K)+UART(4K) stack allocations (36K total),
      the largest free MALLOC_CAP_DMA block is ~5K, regardless of free
      SRAM (137K).

      ESP32's DRAM is a single physical region used BOTH for thread stacks
      (MALLOC_CAP_8BIT) and WiFi DMA buffers (MALLOC_CAP_DMA). Even though
      these are different capability flags, they allocate from the same
      physical memory pool. Each thread stack allocation fragments this
      pool, and the TLSF allocator cannot coalesce sufficiently for
      contiguous DMA allocations of 6.4K+.

      EspDefaultNvsPartition::take() is NOT consumed by EspWifi::new() —
      EspWifi::new() only reads nvs.is_some() to set the nvs_enable
      boolean flag. The nvs_enable flag controls whether the closed-source
      WiFi libpp.a reads PHY calibration data from NVS via its own
      nvs_open("phy") call. This does NOT affect DMA buffer allocation size.

      The "NVS open failed: NvsOpenFailed" warning is a red herring —
      it comes from WifiManager::load_credentials_from_nvs() which calls
      NvsManager::open("wifi") via raw FFI nvs_open(). This is completely
      independent of the Rust EspDefaultNvsPartition. The warning means
      NVS partition hasn't been written yet (empty on first boot), which
      is normal.
    diagnostic: >
      1. Measure heap_caps_get_largest_free_block(MALLOC_CAP_DMA) at boot
         — this is the critical metric, not total free heap.
      2. After Motor(16K)+Temp(16K)+UART(4K) stacks: largest DMA ~5K.
      3. CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM must be set to match the
         available contiguous DMA block (3 max = 4.8K).
      4. CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM=3 is the stable maximum on
         this hardware with current stack sizes.
    fix: >
      Set CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM=3. This gives 3×1600=4.8K
      contiguous DMA which fits in the available heap after 36K of thread
      stacks. Also clone EspSystemEventLoop before passing to
      WifiManager::new() to keep lwIP alive if WiFi init fails.
    refs:
      - docs/plans/pending/26_06_30_phase4_network_report.md
    fix_applied: 2026-07-03

  - id: LL-005
    date: 2026-07-03
    crash_signature: "LoadProhibited, EXCVADDR=0x00000000 — uart stack overflow in sleep()"
    category: instrumentation_gap
    trigger_patterns:
      - "LoadProhibited"
      - "StoreProhibited"
      - "Guru Meditation"
      - "execvaddr:\\s*0x0+"
    lesson: >
      Rust std::panic::set_hook() does NOT fire for hardware exceptions
      (LoadProhibited, StoreProhibited). These go through ESP-IDF's C
      esp_panic_handler() directly. The diag black box and stack watermarks
      are never dumped for hardware crashes. Fix: override esp_panic_handler
      via linker wrapping (-Wl,--wrap=esp_panic_handler) — this is the
      common entry point for ALL ESP-IDF panic events (both Rust panics
      and hardware exceptions).
    diagnostic: >
      Confirm by checking that the "!!! PANIC" header is absent from the
      crash log. If a crash produces Guru Meditation output without the
      diag panic hook header, the hook was bypassed.
    fix: >
      Add __wrap_esp_panic_handler in esp_safe.rs that dumps black box and
      stack watermarks before calling the real handler. Requires linker
      flags and matching panic_info_t / XtExcFrame Rust structs.
    refs:
      - docs/plans/pending/26_07_03_crash_diag_system.md

  - id: LL-004
    date: 2026-07-03
    crash_signature: "assert failed: tcpip_send_msg_wait_sem /IDF/components/lwip/lwip/src/api/tcpip.c:454 (Invalid mbox) — preceded by 'System event loop dropped'"
    category: sysloop_lifecycle
    trigger_patterns:
      - "System event loop dropped"
      - "tcpip_send_msg_wait_sem"
      - "Invalid mbox"
    lesson: >
      When EspWifi::new() fails (e.g. from DMA malloc buffer fail), the
      EspSystemEventLoop parameter is consumed by value and dropped on
      the error return path. The EspSystemEventLoop destructor stops the
      lwIP tcpip thread (via internal FreeRTOS queue deletion). Any
      subsequent lwIP operation — HTTP server bind, BLE GATT init,
      UdpSocket::bind for DNS — crashes with:
        assert failed: tcpip_send_msg_wait_sem ... (Invalid mbox)

      This is an architectural invariant: EspSystemEventLoop must outlive
      ALL lwIP consumers. Since it's consumed by value in
      WifiManager::new(), the caller MUST clone it FIRST and keep the
      clone alive in the same scope.
    diagnostic: >
      Look for "System event loop dropped" in the boot log. If present,
      all subsequent lwIP operations will fail with Invalid mbox assert.
      The assert is a secondary symptom — the primary cause is the
      dropped event loop.
    fix: >
      Clone EspSystemEventLoop before passing to WifiManager::new() and
      keep the clone alive for the entire owner thread scope:
        let _sysloop_keepalive = sys_loop.clone();
        let wifi_mgr = WifiManager::new(modem, sys_loop, ...);
        // _sysloop_keepalive lives here → lwIP stays alive
        // even if WifiManager::new() returns Err
      NOTE: This fix is NECESSARY but NOT SUFFICIENT (see LL-006).
      It only prevents killing an existing TCP/IP thread; it does NOT
      create one if esp_netif_init() was never called.
    refs:
      - docs/plans/pending/26_06_30_phase4_network_report.md
      - docs/crash_reports/boot_invalid_mbox.md
    note: >
      The LL-004 fix prevents the 'System event loop dropped' sub-case but
      does NOT address the case where esp_netif_init() was never called.
      For the complete fix, see LL-006 (call esp_netif_init() unconditionally
      at boot before any network operations).

  - id: LL-006
    date: 2026-07-04
    crash_signature: "assert failed: tcpip_send_msg_wait_sem /IDF/components/lwip/lwip/src/api/tcpip.c:454 (Invalid mbox) — NO 'System event loop dropped' message — preceded by WiFi init failure (create wifi task: failed to create task)"
    category: init_order_error
    trigger_patterns:
      - "Invalid mbox"
      - "tcpip_send_msg_wait_sem"
      - "create wifi task: failed to create task"
      - "assert failed: tcpip_send_msg_wait_sem"
    lesson: >
      esp_netif_init() (which creates the lwIP TCP/IP thread and its mbox)
      is ONLY called inside EspWifi::wrap() → EspNetif::new() →
      initialize_netif_stack(). When EspWifi::new() fails (e.g. from DRAM
      exhaustion in esp_wifi_init), the wrap() is never reached, so the
      TCP/IP thread is never created.

      The LL-004 _sysloop_keepalive clone prevents killing an existing
      TCP/IP thread (by keeping the event loop alive). But if the TCP/IP
      thread was NEVER created (because EspWifi::wrap() never ran), the
      clone is pointless — the mbox is still uninitialized.

      The crash signature is identical to LL-004 (assert: Invalid mbox)
      but WITHOUT the 'System event loop dropped' message, and WITH a
      preceding 'wifi:create wifi task: failed to create task' (0x3001)
      indicating EspWifi::new() failed before creating netifs.
    diagnostic: >
      1. Check for ABSENCE of 'System event loop dropped' log message.
      2. Check for 'wifi:create wifi task: failed to create task' (0x3001).
      3. Verify that esp_netif_init() was called before WifiManager::new().
         If the only call site is inside EspWifi::wrap(), and wrap() was
         skipped, then esp_netif_init() was never called.
      4. Heap trajectory: Pre-WiFi ~136K → Post-WiFi failure ~18K (largest 6K).
    fix: >
      Call esp_netif_init() UNCONDITIONALLY at boot, after
      EspSystemEventLoop::take() and before WifiManager::new(). Add a safe
      wrapper in esp_safe.rs:
        pub fn netif_init() {
            // SAFETY: esp_netif_init() is idempotent.
            unsafe { esp_idf_sys::esp_netif_init(); }
        }
      esp_netif_init() is internally idempotent (guarded by a static flag),
      so calling it before WifiManager::new() has no effect if WiFi init
      succeeds, and ensures the lwIP thread exists if WiFi init fails.
    refs:
      - docs/crash_reports/boot_invalid_mbox.md

  - id: LL-007
    date: 2026-07-04
    crash_signature: "PC=0x402cf9d7 EXCVADDR=0x00000000 A2=0x00000000 — npl_freertos_eventq_get(NULL) called from blecent_host_task"
    category: ignored_return_value
    trigger_patterns:
      - "hci inits failed"
      - "nimble host init failed"
      - "BLE Host Task Started"
      - "pc=0x402cf9d7"
      - "npl_freertos_eventq_get"
    lesson: >
      The esp32-nimble crate's BLEDevice::init() ignores the return value of
      nimble_port_init(). When this function fails (e.g. from DRAM exhaustion
      causing esp_nimble_hci_init() to fail), the BLE host FreeRTOS task is
      still spawned via nimble_port_freertos_init(). The task immediately
      crashes with a NULL dereference because the default event queue
      (g_eventq_dflt) was never initialized (ble_npl_eventq_init() happens
      after the early return in esp_nimble_init()).
    diagnostic: >
      1. Look for "BLE_INIT: hci inits failed" followed by
         "BLE_INIT: nimble host init failed" in the boot log.
      2. Confirm crash backtrace includes npl_freertos_eventq_get called
         from blecent_host_task at ble_device.rs:365.
      3. Crash immediately follows "BLE Host Task Started" log line.
      4. Check heap trajectory: largest contiguous block < 12K before BLE init.
      5. The calling thread (net_owner) is stuck spinning forever in
         BLEDevice::init() waiting for SYNCED flag that will never be set.
    fix: >
      1. PATCH esp32-nimble: return early from BLEDevice::init() if
         nimble_port_init() returns error — do NOT spawn the host task.
      2. Add heap pre-condition check (largest >= 20K) before calling
         ble_mgr.init() in the project main.rs.
      3. Reduce WiFi dynamic buffer counts
         (CONFIG_ESP_WIFI_DYNAMIC_RX_BUFFER_NUM=16,
         CONFIG_ESP_WIFI_DYNAMIC_TX_BUFFER_NUM=16) to minimize
         DRAM fragmentation.
    refs:
      - docs/crash_reports/ble_host_task_null_deref.md
