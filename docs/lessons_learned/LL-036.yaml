id: LL-036
date: 2026-07-09
crash_signature: "Serving /wifi: 3 bytes instead of full CAPTIVE_HTML (blank page)"
category: cpp_constexpr_sizeof_trap
trigger_patterns:
  - "sizeof.*constexpr auto.*string.*3"
  - "captive portal page blank.*3 bytes"
  - "/wifi.*content-length.*3"
lesson: >
  xtensa-esp-elf-g++ has a constexpr evaluation bug: when a constexpr auto string
  variable (type const char[N]) is used as both a decaying argument and a sizeof()
  operand in the same expression, sizeof() incorrectly returns 4 (pointer size on
  Xtensa) instead of N (array size).

  Specifically, in std::string_view(VAR, sizeof(VAR) - 1):
  - First argument VAR: binds to string_view(const char*, size_t) → array decay
  - Second argument sizeof(VAR) - 1: SHOULD evaluate sizeof on the original
    const char[N] type (sizeof is an unevaluated operand, no decay)
  - BUG: the compiler incorrectly applies decay from the first argument to the
    second, so sizeof(VAR) = sizeof(const char*) = 4 instead of N
  
  The fix: only sizeof(VAR) with no prior decay in the same expression gives the
  correct result. But this is fragile — even innocent refactoring can trigger the
  bug if a decaying function call precedes sizeof in the same expression.
  
  NEVER use sizeof() to compute the length of a constexpr auto string variable
  if the variable also appears as a decaying argument in the same expression.
  Always use constexpr std::string_view with the sv literal suffix:
    static constexpr std::string_view VAR = R"delim(...)delim"sv;
  
  Diagnostics: inspect FILES in the ELF via objdump. If all size fields show
  3 (0x03000000), sizeof() has decayed to pointer size.
  
  Confirmed: ALL 10 entries in the constexpr std::array<FileEntry> had size=3
  after constexpr evaluation. Switching to std::string_view eliminated sizeof()
  entirely, giving correct sizes (40-2845 bytes per entry).

  ELF analysis details:
  - objdump shows .rodata entries at correct addresses for each string
  - readelf -r shows NO relocations for the size field — it's a compile-time
    constant set by constexpr evaluation
  - Data pointers had correct relocations with proper addends — only sizes
    were wrong
  - The size relocations have addend=0 and target .rodata.str1.4 base; the
    linker correctly patches the data pointer offsets, but the size field
    is baked as 3 (sizeof(const char*)) at compile time
diagnostic: >
  Add ESP_LOGI(TAG, "/wifi content: %zu bytes", sv.size()) in the handler.
  If the size is 3 or 4 instead of the expected ~1500, sizeof() has decayed
  to pointer size.
  
  Also verify via objdump:
    xtensa-esp-elf-objdump -s -j .rodata firmware.elf | grep -A2 "3e0000"
  If entries show 4 bytes stored instead of expected HTML length, the bug
  is present.
fix: >
  Change the declaration of CAPTIVE_HTML and other embedded file constants
  from 'constexpr auto' to 'constexpr std::string_view' to prevent
  array-to-pointer decay:
  
    // BEFORE (buggy):
    static constexpr auto CAPTIVE_HTML = R"html(...)html";
    std::string_view(CAPTIVE_HTML, sizeof(CAPTIVE_HTML) - 1); // size=3 ❌
    
    // AFTER (correct):
    static constexpr std::string_view CAPTIVE_HTML = R"html(...)html"sv;
    CAPTIVE_HTML; // size=N ✅
  
  Update FILES array to use the string_view directly instead of constructing
  a new string_view with sizeof.
refs:
